<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Propiedad</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f4f9; }
        .container { max-width: 500px; background: white; padding: 25px; border-radius: 8px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        .btn-submit { background-color: #007bff; color: white; border: none; padding: 10px 15px; cursor: pointer; border-radius: 4px; width: 100%; font-size: 16px; }
        .btn-submit:hover { background-color: #0056b3; }
        .btn-volver { display: block; text-align: center; margin-top: 15px; color: #666; text-decoration: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Datos de la Propiedad</h2>
    
    <form th:action="@{/propiedades/guardar}" th:object="${propiedad}" method="post">
        
        <input type="hidden" th:field="*{id}" />

        <div class="form-group">
            <label>Dirección:</label>
            <input type="text" th:field="*{direccion}" required />
        </div>

        <div class="form-group">
            <label>Ciudad:</label>
            <input type="text" th:field="*{ciudad}" required />
        </div>

        <div class="form-group">
            <label>Tipo de Propiedad:</label>
            <select th:field="*{tipo}">
                <option value="CASA">Casa</option>
                <option value="DEPARTAMENTO">Departamento</option>
                <option value="LOCAL">Local</option>
                <option value="TERRENO">Terreno</option>
            </select>
        </div>

        <div class="form-group">
            <label>Cantidad de Ambientes:</label>
            <input type="number" th:field="*{cantidadAmbientes}" min="1" required />
        </div>

        <div class="form-group">
            <label>Metros Cuadrados:</label>
            <input type="number" step="0.1" th:field="*{metrosCuadrados}" min="1" required />
        </div>

        <button type="submit" class="btn-submit">Guardar Propiedad</button>
    </form>
    
    <a th:href="@{/propiedades/listar}" class="btn-volver">Volver al listado</a>
</div>

</body>
</html>
